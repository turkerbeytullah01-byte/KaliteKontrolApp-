name: Build KaliteKontrolApp

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - name: Find and Restore dependencies
      run: |
        $projectFile = Get-ChildItem -Path . -Filter "*.csproj" -Recurse | Select-Object -First 1
        if ($projectFile) {
          Write-Host "Found project file: $($projectFile.FullName)"
          dotnet restore "$($projectFile.FullName)"
        } else {
          Write-Error "No .csproj file found!"
          exit 1
        }
      shell: pwsh
      
    - name: Build
      run: |
        $projectFile = Get-ChildItem -Path . -Filter "*.csproj" -Recurse | Select-Object -First 1
        dotnet build "$($projectFile.FullName)" --configuration Release --no-restore
      shell: pwsh
      
    - name: Publish
      run: |
        $projectFile = Get-ChildItem -Path . -Filter "*.csproj" -Recurse | Select-Object -First 1
        dotnet publish "$($projectFile.FullName)" --configuration Release --no-build --output ./publish
      shell: pwsh
      
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: KaliteKontrolApp-Build
        path: ./publish
        retention-days: 30
