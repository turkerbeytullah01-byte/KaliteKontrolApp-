name: Build KaliteKontrolApp

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - name: Restore dependencies
      run: dotnet restore KaliteKontrolApp/KaliteKontrolApp.csproj
      
    - name: Build
      run: dotnet build KaliteKontrolApp/KaliteKontrolApp.csproj --configuration Release --no-restore
      
    - name: Publish
      run: dotnet publish KaliteKontrolApp/KaliteKontrolApp.csproj --configuration Release --no-build --output ./publish
      
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: KaliteKontrolApp-Build
        path: ./publish
        retention-days: 30
